services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ecommerce-api
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/uploads:/app/apps/api/uploads
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/products').then(res => res.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_BASE_URL_API=${VITE_BASE_URL_API}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: ecommerce-web
    restart: always
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

name: CI/CD Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Di chuyển tới thư mục dự án trên VPS (tự động nhận diện nếu là root)
            if [ "${{ secrets.VPS_USER }}" = "root" ]; then
              cd /root/e-commerce
            else
              cd /home/${{ secrets.VPS_USER }}/e-commerce
            fi
            
            # Cập nhật mã nguồn mới nhất
            git pull origin main
            
            # Đồng bộ các biến môi trường cho Frontend khi build
            echo "VITE_BASE_URL_API=${{ secrets.VITE_BASE_URL_API }}" > apps/web/.env
            echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> apps/web/.env
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> apps/web/.env
            
            # Build và khởi chạy lại các service qua Docker Compose
            docker compose down
            docker compose up -d --build
            
            # Dọn dẹp các docker image cũ/không dùng để tránh đầy ổ đĩa
            docker image prune -f
